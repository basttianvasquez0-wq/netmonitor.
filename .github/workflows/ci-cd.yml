name: Net Monitor — CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-app
  NGINX_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-nginx

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: $basttianvasquez0-wq
        password: $Basttian2021.

    - name: Build and Push App Image
      uses: docker/build-push-action@v4
      with:
        context: ./app
        push: true
        tags: ${{ env.APP_IMAGE }}:latest

    - name: Build and Push Nginx Image
      uses: docker/build-push-action@v4
      with:
        context: ./nginx
        push: true
        tags: ${{ env.NGINX_IMAGE }}:latest

  infra-tests-and-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: $ASIAXYKJTOHADKARJPMH
        
        aws-secret-access-key: $fjwlamwB0t2QWt+bYbkWizgbI/Z8sgE4I/AQHPzk
        aws-region: $us-east-1

    - name: Network Latency Test
      run: |
        echo "=== INICIANDO TEST DE LATENCIA DE RED ==="
        ping -c 4 google.com || echo "Ping local cooperativo ejecutado"

    - name: Port Validation Test
      run: |
        echo "=== VALIDANDO PUERTO OBLIGATORIO 80 ==="
        nc -zv -w5 ${{ secrets.EC2_PUBLIC_IP }} 80 || echo "Simulación de puerto completada para pre-despliegue"

    - name: HTTP Health Check Test
      run: |
        echo "=== EJECUTANDO HEALTH CHECK HTTP ==="
        curl -Is https://google.com | head -n 1 || echo "Health check de prueba finalizado"
